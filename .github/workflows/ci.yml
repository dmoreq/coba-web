name: CI
on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --extra dev --directory backend
      - name: Lint
        run: uv run --directory backend ruff check src/
      - name: Test with coverage
        run: uv run --directory backend pytest tests/ --cov=coba_server --cov-report=term-missing --cov-fail-under=95 -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx @biomejs/biome check src/
      - run: pnpm vitest run
