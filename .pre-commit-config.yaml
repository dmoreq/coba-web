repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: bash -c 'cd frontend && npx @biomejs/biome check src/ --error-on-warnings'
        language: system
        files: ^frontend/
        pass_filenames: false
      - id: biome-format
        name: biome format
        entry: bash -c 'cd frontend && npx @biomejs/biome format src/ --write'
        language: system
        files: ^frontend/
        pass_filenames: false
